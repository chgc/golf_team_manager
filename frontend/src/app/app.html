<mat-toolbar color="primary">
  <span class="app-title">{{ applicationTitle }}</span>

  <nav aria-label="Primary" class="primary-nav">
    @for (item of navigationItems; track item.path) {
      <a
        mat-button
        [routerLink]="item.path"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="identity-badge" aria-label="Current identity">
    <span>{{ authPrincipal().displayName }}</span>
    <span class="identity-divider">|</span>
    <span>{{ authRoleLabel() }}</span>
    <span class="identity-divider">|</span>
    <span>{{ authModeLabel() }}</span>
  </div>
</mat-toolbar>

<main class="app-shell">
  <router-outlet />
</main>
